<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbIn Booth | Cyberpunk Photo Experience</title>
    <meta name="description" content="A futuristic photo booth experience. Capture cyberpunk-styled photo strips with AR stickers and neon effects.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AbIn Booth</h1>
    </header>

    <main class="app-container">
        <!-- Left Panel: Settings & Webcam -->
        <section class="panel left-panel">
            <div class="controls-grid">
                <!-- Layout Controls -->
                <div class="control-group">
                    <span class="control-label">Strip Layout</span>
                    <div class="button-group" id="layout-controls">
                        <button class="toggle-btn" data-value="2">2 Photos</button>
                        <button class="toggle-btn" data-value="3">3 Photos</button>
                        <button class="toggle-btn active" data-value="4">4 Photos</button>
                    </div>
                </div>
                
                <!-- Ratio Controls -->
                <div class="control-group">
                    <span class="control-label">Photo Ratio</span>
                    <div class="button-group" id="ratio-controls">
                        <button class="toggle-btn" data-value="1:1">1:1 Square</button>
                        <button class="toggle-btn active" data-value="4:3">4:3 Std</button>
                        <button class="toggle-btn" data-value="3:4">3:4 Tall</button>
                        <button class="toggle-btn" data-value="2:3">2:3 Classic</button>
                    </div>
                </div>

                <!-- Timer Controls -->
                <div class="control-group">
                    <span class="control-label">Countdown</span>
                    <div class="button-group" id="timer-controls">
                        <button class="toggle-btn active" data-value="3">3s</button>
                        <button class="toggle-btn" data-value="5">5s</button>
                        <button class="toggle-btn" data-value="10">10s</button>
                    </div>
                </div>

                <!-- AR Sticker Controls -->
                <div class="control-group" style="grid-column: span 2;">
                    <span class="control-label">AR Stickers</span>
                    <div class="sticker-grid" id="sticker-controls">
                        <div class="sticker-toggle" data-sticker="bunny" title="Neon Bunny Ears">🐰</div>
                        <div class="sticker-toggle" data-sticker="stars" title="Sparkle Stars">✨</div>
                        <div class="sticker-toggle" data-sticker="hearts" title="Heart Eyes">❤️</div>
                        <div class="sticker-toggle" data-sticker="crown" title="Glitch Crown">👑</div>
                        <div class="sticker-toggle" data-sticker="glasses" title="Cyber Sunglasses">🕶️</div>
                    </div>
                </div>

                <!-- Filter Controls -->
                <div class="control-group" style="grid-column: span 2;">
                    <span class="control-label">Live Filters</span>
                    <div class="button-group" id="filter-controls">
                        <button class="toggle-btn active" data-filter="normal">Normal</button>
                        <button class="toggle-btn" data-filter="bw">B&W</button>
                        <button class="toggle-btn" data-filter="vintage">Vintage</button>
                        <button class="toggle-btn" data-filter="soft">Soft</button>
                        <button class="toggle-btn" data-filter="vivid">Vivid</button>
                        <button class="toggle-btn" data-filter="noir">Noir</button>
                        <button class="toggle-btn" data-filter="neon">Neon</button>
                    </div>
                </div>

                <!-- Frame Theme Controls -->
                <div class="control-group" style="grid-column: span 2;">
                    <span class="control-label">Frame Theme</span>
                    <div class="frame-grid" id="frame-controls">
                        <div class="frame-item active" data-frame="neon" style="border: 2px solid #FF2D78;"><span class="frame-name">Neon</span></div>
                        <div class="frame-item" data-frame="grid" style="background-image: radial-gradient(#333 1px, transparent 1px); background-size: 5px 5px;"><span class="frame-name">Grid</span></div>
                        <div class="frame-item" data-frame="film" style="border-left: 5px dashed #444; border-right: 5px dashed #444;"><span class="frame-name">Film</span></div>
                        <div class="frame-item" data-frame="polaroid" style="background: white; border-bottom: 10px solid white;"><span class="frame-name" style="color: #000;">Polaroid</span></div>
                        <div class="frame-item" data-frame="glitch" style="border: 1px solid #FF2D78; box-shadow: 2px 2px 0 cyan, -2px -2px 0 magenta;"><span class="frame-name">Glitch</span></div>
                        <div class="frame-item" data-frame="cyber" style="border: 2px solid cyan; border-radius: 4px;"><span class="frame-name">Cyber</span></div>
                        <div class="frame-item" data-frame="retro" style="background: linear-gradient(to bottom, #ff0080, #7928ca);"><span class="frame-name">Retro</span></div>
                        <div class="frame-item" data-frame="sakura" style="border: 2px solid #ffb7c5;"><span class="frame-name">Sakura</span></div>
                        <div class="frame-item" data-frame="minimal" style="border: 1px solid white; outline: 1px solid white; outline-offset: -4px;"><span class="frame-name">Minimal</span></div>
                        <div class="frame-item" data-frame="y2k" style="background: linear-gradient(135deg, #e0e0e0, #bdbdbd); border: 2px outset #fff;"><span class="frame-name" style="color:#000">Y2K</span></div>
                        <div class="frame-item" data-frame="manga" style="border: 3px solid #000; background: #fff;"><span class="frame-name" style="color:#000">Manga</span></div>
                        <div class="frame-item" data-frame="vapor" style="background: linear-gradient(to right, #00d2ff, #928dab);"><span class="frame-name">Vapor</span></div>
                        <div class="frame-item" data-frame="luxury" style="border: 3px double #ffd700; background: #000;"><span class="frame-name" style="color:#ffd700">Gold</span></div>
                        <div class="frame-item" data-frame="comic" style="border: 4px solid #000; box-shadow: 4px 4px 0 #ff0;"><span class="frame-name" style="color:#000">Comic</span></div>
                        <div class="frame-item" data-frame="holo" style="background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);"><span class="frame-name">Holo</span></div>
                        <div class="frame-item" data-frame="ticket" style="background: #e94560; border: 2px dashed #fff;"><span class="frame-name">Ticket</span></div>
                        <div class="frame-item" data-frame="denim" style="background: #2b4f81; border: 2px solid #f0a500;"><span class="frame-name">Denim</span></div>
                        <div class="frame-item" data-frame="starry" style="background: #000; border: 1px solid #ffd700;"><span class="frame-name">Starry</span></div>
                        <div class="frame-item" data-frame="cybercity" style="background: linear-gradient(to top, #1a1a2e, #16213e);"><span class="frame-name">City</span></div>
                        <div class="frame-item" data-frame="graffiti" style="background: #333; border: 2px solid #00ff00;"><span class="frame-name">Graffiti</span></div>
                        <div class="frame-item" data-frame="space" style="background: #0b0d17;"><span class="frame-name">Space</span></div>
                    </div>
                </div>
            </div>

            <div class="preview-container">
                <video id="webcam-video" autoplay playsinline muted></video>
                <canvas id="ar-canvas"></canvas>
                <div class="countdown-overlay" id="countdown-text">3</div>
                <div class="flash-overlay" id="flash"></div>
                <div class="status-indicator" id="shoot-status">Photo 1 of 4</div>
                <div class="review-controls" id="review-controls">
                    <button class="review-btn retake-shot" id="retake-shot-btn">Retake</button>
                    <button class="review-btn next-shot" id="next-shot-btn">Keep & Next</button>
                </div>
            </div>

            <button class="start-btn" id="start-btn">Start Shoot</button>
        </section>

        <!-- Right Panel: Result Strip -->
        <section class="panel right-panel">
            <h2 class="strip-preview-title">Your Strip</h2>
            <div id="strip-canvas-container">
                <canvas id="strip-canvas"></canvas>
            </div>
            <div class="ready-badge" id="ready-badge">✦ Strip Ready</div>
            <div class="action-buttons">
                <button class="action-btn download-btn" id="download-btn">Strip</button>
                <button class="action-btn action-btn download-btn gif-btn" id="gif-btn">GIF</button>
                <button class="action-btn retake-btn" id="retake-btn">Retake</button>
            </div>

            <!-- Individual Gallery -->
            <div class="gallery-container" id="gallery-container">
                <div class="gallery-title">Individual Frames</div>
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Thumbnails go here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Application Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
